<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lead Capture Admin</title>
    <style>
      :root { color-scheme: light; --ink:#14202b; --muted:#5c6b78; --line:#d7e0e7; --bg:#f6f8fa; --panel:#ffffff; --accent:#106b62; --bad:#9b2c2c; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { max-width:1180px; margin:0 auto; padding:28px 18px 48px; }
      header { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:18px; }
      h1 { margin:0; font-size:28px; line-height:1.15; }
      h2 { margin:0 0 12px; font-size:18px; }
      p { margin:4px 0 0; color:var(--muted); }
      section { background:var(--panel); border:1px solid var(--line); padding:18px; margin-top:16px; }
      input, select, textarea, button { font:inherit; }
      input, select, textarea { width:100%; border:1px solid var(--line); padding:10px 11px; background:#fff; color:var(--ink); }
      textarea { min-height:180px; resize:vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:13px; }
      button { border:0; background:var(--accent); color:#fff; padding:10px 14px; cursor:pointer; font-weight:700; }
      button.secondary { background:#22313f; }
      button:disabled { opacity:.55; cursor:not-allowed; }
      .auth { display:grid; grid-template-columns:minmax(220px, 1fr) auto auto; gap:8px; align-items:end; min-width:min(640px, 100%); }
      .stats { display:grid; grid-template-columns:repeat(5, minmax(130px, 1fr)); gap:10px; }
      .stat { border:1px solid var(--line); padding:12px; background:#fbfcfd; }
      .stat b { display:block; font-size:24px; }
      table { width:100%; border-collapse:collapse; font-size:13px; }
      th, td { border-bottom:1px solid var(--line); text-align:left; vertical-align:top; padding:9px 8px; }
      th { color:var(--muted); font-size:12px; text-transform:uppercase; }
      .grid { display:grid; grid-template-columns:260px 1fr; gap:12px; }
      .template-list { display:grid; gap:8px; }
      .row { display:grid; grid-template-columns:1fr 110px; gap:8px; }
      .status { min-height:20px; color:var(--muted); }
      .status.error { color:var(--bad); }
      @media (max-width: 760px) { header, .auth, .grid, .row, .stats { grid-template-columns:1fr; display:grid; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Lead Capture</h1>
          <p>Contacts, submissions, CSV export, and email templates.</p>
        </div>
        <div class="auth">
          <label>Admin token<input id="token" type="password" autocomplete="current-password"></label>
          <button id="load">Load</button>
          <button class="secondary" id="export">CSV</button>
        </div>
      </header>

      <p class="status" id="status"></p>

      <section>
        <h2>Stats</h2>
        <div class="stats" id="stats"></div>
      </section>

      <section>
        <h2>Submissions</h2>
        <div style="overflow:auto"><table id="submissions"></table></div>
      </section>

      <section>
        <h2>Contacts</h2>
        <div style="overflow:auto"><table id="contacts"></table></div>
      </section>

      <section>
        <h2>Email Templates</h2>
        <div class="grid">
          <div class="template-list" id="template-list"></div>
          <form id="template-form">
            <div class="row">
              <label>Key<input name="key" required></label>
              <label>Channel<select name="channel"><option>subject</option><option>html</option><option>text</option></select></label>
            </div>
            <label>Name<input name="name" required></label>
            <label>Body<textarea name="body" required></textarea></label>
            <div class="row">
              <button type="submit">Save Template</button>
              <input id="test-to" type="email" placeholder="test@example.com">
            </div>
            <button class="secondary" type="button" id="test-email">Send Test</button>
          </form>
        </div>
      </section>
    </main>

    <script>
      const $ = selector => document.querySelector(selector);
      const tokenInput = $('#token');
      const statusEl = $('#status');
      const savedToken = sessionStorage.getItem('leadCaptureToken') || '';
      tokenInput.value = savedToken;
      let templates = [];

      function setStatus(message, error = false) {
        statusEl.textContent = message || '';
        statusEl.className = error ? 'status error' : 'status';
      }

      function token() {
        const value = tokenInput.value.trim();
        if (value) sessionStorage.setItem('leadCaptureToken', value);
        return value;
      }

      async function api(path, options = {}) {
        const response = await fetch(`${path}${path.includes('?') ? '&' : '?'}token=${encodeURIComponent(token())}`, {
          ...options,
          headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function renderStats(stats = {}) {
        $('#stats').innerHTML = Object.entries(stats).map(([key, value]) => `<div class="stat"><span>${key.replaceAll('_', ' ')}</span><b>${value ?? 0}</b></div>`).join('');
      }

      function renderTable(selector, rows, columns) {
        const table = $(selector);
        table.innerHTML = `<thead><tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr></thead><tbody>${(rows || []).map(row => `<tr>${columns.map(col => `<td>${String(row[col] ?? '').slice(0, 500)}</td>`).join('')}</tr>`).join('')}</tbody>`;
      }

      function renderTemplates() {
        $('#template-list').innerHTML = templates.map((tpl, index) => `<button type="button" class="secondary" data-template="${index}">${tpl.key} / ${tpl.channel}</button>`).join('');
      }

      async function loadAll() {
        setStatus('Loading...');
        const [data, templateData] = await Promise.all([
          api('/admin/lead-capture'),
          api('/admin/lead-capture/templates'),
        ]);
        templates = templateData.templates || [];
        renderStats(data.stats || {});
        renderTable('#submissions', data.submissions || [], ['id', 'form_id', 'email', 'name', 'source', 'status', 'created_at', 'data']);
        renderTable('#contacts', data.contacts || [], ['id', 'email', 'name', 'organization', 'source', 'consent_status', 'created_at']);
        renderTemplates();
        setStatus('Loaded.');
      }

      $('#load').addEventListener('click', () => loadAll().catch(error => setStatus(error.message, true)));
      $('#export').addEventListener('click', () => {
        window.location.href = `/admin/lead-capture?format=csv&token=${encodeURIComponent(token())}`;
      });
      $('#template-list').addEventListener('click', event => {
        const button = event.target.closest('[data-template]');
        if (!button) return;
        const tpl = templates[Number(button.dataset.template)];
        const form = $('#template-form');
        form.key.value = tpl.key;
        form.channel.value = tpl.channel;
        form.name.value = tpl.name;
        form.body.value = tpl.body;
      });
      $('#template-form').addEventListener('submit', event => {
        event.preventDefault();
        const body = Object.fromEntries(new FormData(event.currentTarget).entries());
        api('/admin/lead-capture/templates', { method: 'POST', body: JSON.stringify(body) })
          .then(loadAll)
          .catch(error => setStatus(error.message, true));
      });
      $('#test-email').addEventListener('click', () => {
        const form = $('#template-form');
        api('/admin/lead-capture/test-email', {
          method: 'POST',
          body: JSON.stringify({ to: $('#test-to').value, template_key: form.key.value || 'test-email' }),
        })
          .then(result => setStatus(result.email_sent ? 'Test email sent.' : 'Test email was not sent. Check Resend configuration.', !result.email_sent))
          .catch(error => setStatus(error.message, true));
      });
      if (savedToken) loadAll().catch(() => {});
    </script>
  </body>
</html>
